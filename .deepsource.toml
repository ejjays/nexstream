version = 1

exclude_patterns = [
  "engine/bak/**",
  "scripts/**",
  "mobile/**",
  "temp_refs/**",
  "temp_refs2/**",
  "*.md"
]

test_patterns = [
  "backend/tests/**",
  "engine/tests/**",
  "**/*.test.ts",
  "**/*.test.js"
]

[[analyzers]]
name = "javascript"
enabled = true
  [analyzers.meta]
  environment = ["nodejs", "browser", "vitest"]
  dialect = "typescript"
  module_system = "es-modules"
  plugins = ["react"]

[[analyzers]]
name = "python"
enabled = true
  [analyzers.meta]
  runtime_version = "3.10"
  max_line_length = 110
  skip_doc_coverage = ["magic_methods", "init", "test"]

[[analyzers]]
name = "docker"
enabled = true

[[analyzers]]
name = "shell"
enabled = true
