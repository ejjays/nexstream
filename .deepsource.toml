version = 1

[exclude_patterns]
patterns = [
  "**/node_modules/**",
  "**/dist/**",
  "**/bak/**",
  "**/temp/**",
  "**/temp_refs/**",
  "scripts/**",
  "BTC-ISMIR19/**",
  "mobile/**",
  "**/public/libav/**",
  "**/public/ffmpeg-core/**"
]

[test_patterns]
patterns = [
  "**/tests/**",
  "**/*.test.ts",
  "**/*.test.js"
]

[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  environment = ["node", "browser"]
  dialect = "typescript"
  plugins = ["react"]

  [[analyzers.issue_rules]]
  name = "typescript-no-explicit-any"
  ignore_patterns = [
    "**/services/extractors/**",
    "**/services/spotify/**"
  ]

[[analyzers]]
name = "python"
enabled = true

  [analyzers.meta]
  runtime_version = "3.10"
  max_line_length = 110
  skip_doc_coverage = ["magic_methods", "init", "test"]

[[analyzers]]
name = "docker"
enabled = true

[[analyzers]]
name = "shell"
enabled = true
