version = 1

# skip files
exclude_patterns = [
  "**/node_modules/**",
  "**/dist/**",
  "engine/bak/**",
  "backend/temp/**",
  "**/temp_refs/**",
  "scripts/**",
  "BTC-ISMIR19/**",
  "mobile/**",
  "**/public/libav/**",
  "**/public/ffmpeg-core/**"
]

# test patterns
test_patterns = [
  "backend/tests/**",
  "engine/tests/**",
  "**/*.test.ts",
  "**/*.test.js"
]

[[analyzers]]
name = "javascript"
enabled = true
  [analyzers.meta]
  environment = ["nodejs", "browser"]
  plugins = ["react"]

[[analyzers]]
name = "python"
enabled = true
  [analyzers.meta]
  runtime_version = "3.x.x"
  max_line_length = 110
  skip_doc_coverage = ["magic", "init", "test"]

[[analyzers]]
name = "docker"
enabled = true

[[analyzers]]
name = "shell"
enabled = true
