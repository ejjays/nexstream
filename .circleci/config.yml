version: 2.1

commands:
  halt-unless-changed:
    description: halt the job when matching paths are unchanged
    parameters:
      pattern:
        type: string
    steps:
      - run:
          name: check changes
          command: |
            if ! git rev-parse HEAD~1 > /dev/null 2>&1; then
              echo "no parent commit; running."
            elif git diff --name-only HEAD~1 HEAD | grep -E "<< parameters.pattern >>" > /dev/null; then
              echo "relevant changes; running."
            else
              echo "no relevant changes; skipping."
              circleci-agent step halt
            fi

jobs:
  test-backend:
    docker:
      - image: cimg/node:22.12
      - image: cimg/redis:7.0
    steps:
      - checkout:
          method: full
      - halt-unless-changed:
          pattern: "^backend/|^shared/|^.circleci/config.yml"
      - restore_cache:
          keys:
            - v2-backend-{{ checksum "backend/package-lock.json" }}-{{ checksum "shared/package-lock.json" }}
            - v2-backend-{{ checksum "backend/package-lock.json" }}-
      - run:
          name: Install FFmpeg, Python, and System Dependencies
          command: |
            sudo apt-get update
            sudo apt-get install -y ffmpeg python3 python3-pip
            sudo pip3 install --upgrade yt-dlp
      - run:
          name: Install Backend Dependencies
          command: |
            cd shared && npm ci && cd ..
            cd backend && npm ci
      - save_cache:
          paths:
            - backend/node_modules
            - shared/node_modules
            - backend/bin
          key: v2-backend-{{ checksum "backend/package-lock.json" }}-{{ checksum "shared/package-lock.json" }}
      - run:
          name: Typecheck, lint, and build
          command: |
            cd backend
            npx tsc --noEmit
            npm run lint:all
            npm run build
      - run:
          name: Run Deterministic Core Tests
          command: |
            cd backend
            # exclude manual tests
            npx vitest run --coverage --environment node
      - store_test_results:
          path: backend/test-results.xml
      - store_artifacts:
          path: backend/test-results.xml
          destination: test-results.xml
      - store_artifacts:
          path: backend/coverage
          destination: coverage-report

  test-frontend:
    docker:
      - image: cimg/node:22.12
    steps:
      - checkout:
          method: full
      - halt-unless-changed:
          pattern: "^frontend/|^shared/|^.circleci/config.yml"
      - restore_cache:
          keys:
            - v3-frontend-{{ checksum "frontend/package-lock.json" }}
      - run:
          name: Install Frontend Dependencies
          command: |
            cd shared && npm ci && cd ..
            cd frontend && npm ci
      - save_cache:
          paths:
            - frontend/node_modules
          key: v3-frontend-{{ checksum "frontend/package-lock.json" }}
      - run:
          name: Typecheck and lint
          command: |
            cd frontend
            npx tsc --noEmit
            npm run lint:all
      - run:
          name: Run Frontend Tests
          command: |
            cd frontend
            npx vitest run

  test-mobile:
    docker:
      - image: cimg/node:22.12
    steps:
      - checkout:
          method: full
      - halt-unless-changed:
          pattern: "^mobile/android/|^.circleci/config.yml"
      - restore_cache:
          keys:
            - v1-mobile-{{ checksum "mobile/android/package-lock.json" }}
      - run:
          name: Install Mobile Dependencies
          command: cd mobile/android && npm ci
      - save_cache:
          paths:
            - mobile/android/node_modules
          key: v1-mobile-{{ checksum "mobile/android/package-lock.json" }}
      - run:
          name: Typecheck, lint, and test
          command: |
            cd mobile/android
            npx tsc --noEmit
            npm run lint:all
            npx vitest run

  synthetic-live-tests:
    docker:
      - image: cimg/node:22.12
    steps:
      - checkout
      - run:
          name: Setup YouTube Cookies
          command: |
            if [ -n "$YOUTUBE_COOKIES_BASE64" ]; then
              mkdir -p backend/temp
              echo "$YOUTUBE_COOKIES_BASE64" | base64 --decode > backend/temp/cookies.txt
            fi
      - run:
          name: Execute Live Upstream Health Checks
          command: |
            cd backend
            npm ci
            # runs benchmark tests
            VITEST_INCLUDE_MANUAL=1 npx vitest run \
              tests/flows/live.test.ts \
              tests/manual/yt_live.test.ts

  deploy-frontend:
    docker:
      - image: cimg/node:22.12
    steps:
      - checkout:
          method: full
      - halt-unless-changed:
          pattern: "^frontend/|^.circleci/config.yml"
      - restore_cache:
          keys:
            - v3-frontend-{{ checksum "frontend/package-lock.json" }}
      - run:
          name: Build and Deploy Frontend
          command: |
            cd frontend
            npm ci
            npm run build
            rm -rf dist/ffmpeg-core dist/libav
            cp -r functions dist/
            npx --yes wrangler@4.93.0 pages deploy dist --project-name nex-stream --branch main
      - save_cache:
          paths:
            - frontend/node_modules
            - ~/.npm
          key: v3-frontend-{{ checksum "frontend/package-lock.json" }}

  deploy-hf-space:
    docker:
      - image: cimg/base:current
    steps:
      - checkout:
          method: full
      - halt-unless-changed:
          pattern: "^backend/|^shared/|^.dockerignore|^.circleci/config.yml"
      - run:
          name: Deploy backend to Hugging Face Space
          command: |
            set -e
            : "${HF_TOKEN:?set HF_TOKEN in CircleCI project env vars}"
            HF_USER=ejjays
            HF_SPACE=nexstream-api
            SRC="$CIRCLE_WORKING_DIRECTORY"
            AUTH=$(printf '%s' "$HF_USER:$HF_TOKEN" | base64 | tr -d '\n')
            WORK=$(mktemp -d)
            cd "$WORK"
            git clone "https://huggingface.co/spaces/$HF_USER/$HF_SPACE" space
            cd space
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            # tracked source only (no node_modules/dist)
            git -C "$SRC" archive HEAD shared backend | tar -x
            cp "$SRC/backend/Dockerfile.hf" ./Dockerfile
            cp "$SRC/backend/hf-space.md"  ./README.md
            cp "$SRC/.dockerignore"        ./.dockerignore
            git add -A
            if git diff --cached --quiet; then echo "no changes to deploy"; exit 0; fi
            git -c user.email="ci@nexstream.local" -c user.name="circleci" \
              commit -q -m "deploy ${CIRCLE_SHA1:0:7}"
            git -c http.extraheader="AUTHORIZATION: Basic $AUTH" push origin HEAD:main
            echo "deployed ${CIRCLE_SHA1:0:7} to HF Space"

  security-scan:
    docker:
      - image: cimg/node:22.12
    steps:
      - checkout
      - run:
          name: Dependency audit (npm)
          command: |
            for dir in backend frontend shared; do
              echo "=== npm audit: $dir ==="
              (cd "$dir" && npm audit --omit=dev --audit-level=critical)
            done
      - run:
          name: Supply-chain scan (OSV-Scanner)
          command: |
            OSV_VERSION=2.3.5
            URL="https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_${OSV_VERSION}_linux_amd64"
            if curl -sSfL "$URL" -o /tmp/osv-scanner; then
              chmod +x /tmp/osv-scanner
              /tmp/osv-scanner --version
              /tmp/osv-scanner scan source \
                --lockfile=backend/package-lock.json \
                --lockfile=frontend/package-lock.json \
                --lockfile=shared/package-lock.json || true
            else
              echo "OSV-Scanner download failed; skipping"
            fi

workflows:
  build_and_deploy:
    jobs:
      - test-backend
      - test-frontend
      - test-mobile
      - security-scan
      - deploy-frontend:
          requires:
            - test-backend
            - test-frontend
          filters:
            branches:
              only: main
      - deploy-hf-space:
          requires:
            - test-backend
          filters:
            branches:
              only: main

  live_api_health_check:
    triggers:
      - schedule:
          cron: "0 * * * *" # runs every hour
          filters:
            branches:
              only:
                - main
    jobs:
      - synthetic-live-tests
