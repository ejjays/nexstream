<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RemixLab UI Prototypes (V2)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: system-ui, -apple-system, sans-serif; transition: background-color 0.3s; margin: 0; }
        .prototype-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; padding: 2rem; transition: all 0.3s ease; }
        
        .prototype-card { 
            position: relative; 
            border-radius: 1rem; 
            overflow: hidden; 
            background: #0a0a0a; 
            border: 1px solid #27272a; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 2rem; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 400px;
        }
        
        .prototype-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.8); z-index: 10; }
        
        .prototype-title { position: absolute; top: 0; left: 0; right: 0; background: #27272a; padding: 0.5rem; text-align: center; font-size: 0.8rem; font-weight: bold; letter-spacing: 0.1em; text-transform: uppercase; color: #a1a1aa; pointer-events: none; z-index: 50; }
        
        /* Fixed Fullscreen Logic */
        .prototype-card.active {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            border-radius: 0;
            border: none;
            transform: none !important;
            margin: 0;
        }
        
        body.is-fullscreen { overflow: hidden; }
        body.is-fullscreen > h1, body.is-fullscreen > .prototype-container > .prototype-card:not(.active) { display: none; }
        .prototype-card.active .prototype-title { display: none; }

        .back-btn { position: fixed; top: 1rem; left: 1rem; background: rgba(255,255,255,0.1); color: white; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; display: none; z-index: 10000; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        body.is-fullscreen .back-btn { display: block; }
    </style>
</head>
<body>
    <button class="back-btn" onclick="exitFullscreen(event)">← Back to Grid</button>
    <h1 class="text-3xl font-bold text-center py-8 text-white">Upload UI - Batch 2 <span class="text-sm text-zinc-500 block mt-2 font-normal">Click any design to expand to full screen</span></h1>
    
    <div class="prototype-container">
        
        <!-- Design 5: Apple "Glass" Modern (Like VisionOS) -->
        <div class="prototype-card bg-[#000000] border-zinc-800" onclick="makeFullscreen(this)">
            <div class="prototype-title text-white bg-zinc-800/80 backdrop-blur-md">5. Vision OS (Frosted Glass)</div>
            
            <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/20 via-purple-500/5 to-black pointer-events-none"></div>
            
            <div class="relative z-10 w-full max-w-[340px] bg-white/5 backdrop-blur-xl border border-white/10 p-6 rounded-3xl shadow-2xl flex flex-col gap-6">
                
                <div class="text-center mb-2">
                    <div class="inline-flex p-3 bg-white/10 rounded-2xl mb-3 shadow-inner border border-white/5">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    </div>
                    <h2 class="text-xl font-medium tracking-tight text-white/90">New Session</h2>
                </div>

                <div class="bg-black/40 rounded-2xl p-1 flex shadow-inner border border-white/5">
                    <input type="text" placeholder="https://kaggle.gradio.live" class="w-full bg-transparent px-4 py-3 text-[15px] focus:outline-none text-white placeholder:text-white/30 text-center font-medium tracking-wide">
                </div>

                <div class="bg-black/40 rounded-2xl p-1.5 flex shadow-inner border border-white/5">
                    <button class="flex-1 py-2.5 text-[13px] font-medium rounded-xl bg-white/15 text-white shadow-sm border border-white/10">Demucs</button>
                    <button class="flex-1 py-2.5 text-[13px] font-medium text-white/50 hover:text-white transition-colors">RoFormer</button>
                </div>
                
                <button class="w-full mt-2 py-4 bg-white/90 text-black font-semibold text-[15px] rounded-2xl hover:bg-white transition-all shadow-[0_0_20px_rgba(255,255,255,0.2)]">Start Analysis</button>
            </div>
        </div>

        <!-- Design 6: Spotify / Clean Gradient -->
        <div class="prototype-card bg-[#121212] border-transparent" onclick="makeFullscreen(this)">
            <div class="prototype-title text-zinc-300 bg-[#282828]">6. Spotify (Clean Gradient)</div>
            
            <div class="w-full max-w-[340px] flex flex-col gap-6">
                
                <div class="w-full h-40 bg-gradient-to-b from-[#404040] to-[#282828] rounded-md shadow-lg flex items-center justify-center border border-[#333] mb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#b3b3b3" stroke-width="1"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                </div>

                <div class="flex flex-col gap-2">
                    <input type="text" placeholder="API Endpoint URL" class="w-full bg-[#2a2a2a] hover:bg-[#333] focus:bg-[#333] border-none rounded-sm px-4 py-3.5 text-sm focus:outline-none text-white placeholder:text-[#a7a7a7] transition-colors font-medium">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button class="py-3 text-sm font-bold rounded-full bg-[#1db954] text-black">Demucs</button>
                    <button class="py-3 text-sm font-bold rounded-full bg-transparent border border-[#727272] text-white hover:border-white transition-colors">RoFormer</button>
                </div>
            </div>
        </div>

        <!-- Design 7: Brutalist / High Contrast -->
        <div class="prototype-card bg-[#e5e5e5] border-black" onclick="makeFullscreen(this)">
            <div class="prototype-title text-black bg-white border-b-2 border-black">7. Light Brutalist (Vogue)</div>
            
            <div class="w-full max-w-[340px] flex flex-col gap-5 text-black">
                
                <h1 class="text-5xl font-black tracking-tighter uppercase leading-none border-b-4 border-black pb-4 mb-2">REMIX<br>LAB.</h1>
                
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-bold uppercase tracking-widest">Kaggle URL</label>
                    <input type="text" placeholder="PASTE LINK" class="w-full bg-transparent border-2 border-black rounded-none px-4 py-3 text-sm focus:outline-none text-black placeholder:text-black/30 font-bold uppercase">
                </div>

                <div class="flex flex-col gap-1 mt-2">
                    <label class="text-xs font-bold uppercase tracking-widest">Select Engine</label>
                    <div class="flex gap-2">
                        <button class="flex-1 py-3 text-sm font-black border-2 border-black bg-black text-white uppercase tracking-wider">Demucs</button>
                        <button class="flex-1 py-3 text-sm font-black border-2 border-black bg-transparent text-black uppercase tracking-wider hover:bg-black/5">RoFormer</button>
                    </div>
                </div>

                <button class="w-full mt-6 py-4 bg-[#ff3366] border-2 border-black text-white font-black text-lg uppercase tracking-widest shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:translate-y-1 hover:shadow-[0px_0px_0px_0px_rgba(0,0,0,1)] transition-all">PROCESS FILE</button>
            </div>
        </div>

        <!-- Design 8: Material Design 3 (Google/Android Style) -->
        <div class="prototype-card bg-[#1c1b1f] border-transparent" onclick="makeFullscreen(this)">
            <div class="prototype-title text-[#cac4d0] bg-[#49454f]">8. Android Material (Smooth)</div>
            
            <div class="w-full max-w-[340px] flex flex-col gap-6">
                
                <div class="text-center mb-2">
                    <h2 class="text-2xl font-normal tracking-tight text-[#e6e1e5]">Upload Audio</h2>
                </div>
                
                <!-- Material Input -->
                <div class="relative bg-[#49454f]/30 rounded-t-md border-b-2 border-[#d0bcff] pt-6 pb-2 px-4 focus-within:bg-[#49454f]/50 transition-colors">
                    <label class="absolute top-2 left-4 text-xs font-medium text-[#d0bcff]">API Endpoint</label>
                    <input type="text" placeholder="https://..." class="w-full bg-transparent border-none text-[16px] focus:outline-none text-[#e6e1e5] placeholder:text-[#cac4d0]/50">
                </div>
                
                <!-- Material Toggle (Segmented Button) -->
                <div class="flex border border-[#938f99] rounded-full overflow-hidden mt-2 h-10">
                    <button class="flex-1 bg-[#d0bcff] text-[#381e72] font-medium text-sm flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        Demucs
                    </button>
                    <button class="flex-1 bg-transparent text-[#e6e1e5] font-medium text-sm border-l border-[#938f99] hover:bg-[#49454f]/30 transition-colors">
                        RoFormer
                    </button>
                </div>

                <!-- Material FAB/Primary Button -->
                <div class="flex justify-end mt-4">
                    <button class="px-6 py-3 bg-[#d0bcff] text-[#381e72] font-medium text-sm rounded-full hover:bg-[#eaddff] transition-colors shadow-md flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                        Select File
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function makeFullscreen(card) {
            document.body.className = "is-fullscreen";
            card.classList.add("active");
            
            // Apply the background color of the card to the body seamlessly
            const bgColor = window.getComputedStyle(card).backgroundColor;
            document.body.style.backgroundColor = bgColor;
        }

        function exitFullscreen(e) {
            e.stopPropagation(); // Prevent re-triggering card click
            document.body.className = "";
            document.body.style.backgroundColor = "";
            document.querySelectorAll(".prototype-card").forEach(c => c.classList.remove("active"));
        }
    </script>
</body>
</html>
