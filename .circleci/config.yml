version: 2.1

jobs:
  test-backend:
    docker:
      - image: cimg/node:22.12
      - image: cimg/redis:7.0
    steps:
      - checkout
      - run:
          name: check changes
          command: |
            if git diff --name-only HEAD~1 HEAD | grep -E "^backend/|^.circleci/config.yml" > /dev/null; then
              echo "backend changed. testing..."
            else
              echo "no backend changes. skipping."
              circleci-agent step halt
            fi
      - restore_cache:
          keys:
            - v2-backend-{{ checksum "backend/package-lock.json" }}
            - v2-backend-
      - run:
          name: Install Backend Dependencies & Binaries
          command: |
            cd backend
            npm ci
            
            mkdir -p bin
            
            if [ ! -x bin/yt-dlp ]; then
              curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o bin/yt-dlp
              chmod a+rx bin/yt-dlp
            fi
            
            if [ ! -x bin/ffmpeg ]; then
              curl -L https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v6.1/ffmpeg-6.1-linux-64.zip -o ffmpeg.zip
              unzip -o ffmpeg.zip -d bin/
              rm ffmpeg.zip
              chmod a+rx bin/ffmpeg
            fi
            
            sudo cp bin/* /usr/local/bin/
      - save_cache:
          paths:
            - backend/node_modules
            - backend/bin
          key: v2-backend-{{ checksum "backend/package-lock.json" }}
      - run:
          name: Setup YouTube Cookies
          command: |
            if [ -n "$YOUTUBE_COOKIES_BASE64" ]; then
              mkdir -p backend/temp
              echo "$YOUTUBE_COOKIES_BASE64" | base64 --decode > backend/temp/cookies.txt
            fi
      - run:
          name: run tests
          command: |
            cd backend
            npm run dev &
            for i in {1..30}; do
              curl -s http://localhost:5000/ping && break
              echo "waiting for backend..."
              sleep 1
            done
            
            echo "running core tests..."
            npx vitest run tests/engine.test.ts
            
            if [ "$CIRCLE_BRANCH" == "main" ]; then
              echo "running live tests (main only)..."
              npx vitest run tests/live.test.ts
            else
              echo "skipping live tests."
            fi
            
            kill $(jobs -p) || true

  deploy-frontend:
    docker:
      - image: cimg/node:22.12
    steps:
      - checkout
      - run:
          name: Check for Frontend Changes
          command: |
            # check frontend changes
            if git diff --name-only HEAD~1 HEAD | grep -E "^frontend/|^.circleci/config.yml" > /dev/null; then
              echo "Frontend or CI changes detected. Continuing build..."
            else
              echo "No frontend changes detected. Skipping deployment to save minutes."
              circleci-agent step halt
            fi
      - restore_cache:
          keys:
            - v3-frontend-{{ checksum "frontend/package-lock.json" }}
            - v3-frontend-
      - run:
          name: Build and Deploy Frontend
          command: |
            cd frontend
            npm ci
            npm run build
            rm -rf dist/ffmpeg-core dist/libav
            cp -r functions dist/
            # cache npx downloads
            npx --yes wrangler@4.93.0 pages deploy dist --project-name nex-stream --branch main
      - save_cache:
          paths:
            - frontend/node_modules
            - ~/.npm
          key: v3-frontend-{{ checksum "frontend/package-lock.json" }}

workflows:
  version: 2
  build_and_test:
    jobs:
      - test-backend
      - deploy-frontend:
          requires:
            - test-backend
          filters:
            branches:
              only: main
