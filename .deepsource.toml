version = 1

exclude_patterns = [
  "**/public/libav/**",
  "**/public/ffmpeg-core/**",
  "**/bak/**",
  "mobile/**",
  "scripts/**"
]

test_patterns = [
  "web/backend/tests/**",
  "web/frontend/tests/**",
  "remix/tests/**"
]

[[analyzers]]
name = "javascript"
enabled = true
  [analyzers.meta]
  environment = ["nodejs", "browser", "vitest"]
  dialect = "typescript"
  module_system = "es-modules"
  plugins = ["react"]

[[analyzers]]
name = "python"
enabled = true
  [analyzers.meta]
  runtime_version = "3.10"
  max_line_length = 110
  skip_doc_coverage = ["magic", "init"]

[[analyzers]]
name = "docker"
enabled = true

[[analyzers]]
name = "shell"
enabled = true
