version: 2.1

jobs:
  test-backend:
    docker:
      - image: cimg/node:22.0
      - image: cimg/redis:7.0
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "backend/package-lock.json" }}
            - v1-dependencies-
      - run:
          name: Install Backend Dependencies
          command: |
            cd backend
            npm install
            npm install @rollup/rollup-linux-x64-gnu @rolldown/binding-linux-x64-gnu
            sudo apt-get update && sudo apt-get install -y ffmpeg
            sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
            sudo chmod a+rx /usr/local/bin/yt-dlp
      - save_cache:
          paths:
            - backend/node_modules
          key: v1-dependencies-{{ checksum "backend/package-lock.json" }}
      - run:
          name: Setup YouTube Cookies
          command: |
            if [ -n "$YOUTUBE_COOKIES_BASE64" ]; then
              mkdir -p backend/temp
              echo "$YOUTUBE_COOKIES_BASE64" | base64 --decode > backend/temp/cookies.txt
            fi
      - run:
          name: Run Backend Tests
          command: |
            cd backend
            npm test

  deploy-frontend:
    docker:
      - image: cimg/node:20.0
    steps:
      - checkout
      - run:
          name: Build and Deploy Frontend
          command: |
            cd frontend
            npm install
            npm run build
            # clear large files
            rm -rf dist/ffmpeg-core
            rm -rf dist/libav
            # copy functions
            cp -r functions dist/
            # push to cloudflare
            npx wrangler pages deploy dist --project-name nex-stream --branch main

workflows:
  version: 2
  build_and_test:
    jobs:
      - test-backend
      - deploy-frontend:
          requires:
            - test-backend
          filters:
            branches:
              only: main
